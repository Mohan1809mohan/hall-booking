<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Admin Panel</h2>

<div id="login">
  <input type="text" id="adminPhone" placeholder="Admin Phone">
  <button onclick="adminLogin()">Login</button>
</div>

<div id="panel" style="display:none;">

  <!-- ADMIN BOOKING -->
  <h3>Add Booking</h3>

  <input type="text" id="aname" placeholder="Customer Name">
  <input type="text" id="aphone" placeholder="Phone">

  <input type="date" id="astart">
  <input type="date" id="aend">

  <button onclick="adminBook()">Add Booking</button>

  <!-- LIST -->
  <h3>All Bookings</h3>
  <ul id="list"></ul>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script src="script.js"></script>

</body>
</html>
