<!DOCTYPE html>
<html>
<head>
  <title>Yadava Kalyanamandapam Booking</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>

<body>

<div class="container">

  <h2>YADAVA KALYANAMANDAPAM</h2>

  <div id="loginBox">
    <input type="text" id="custPhone" placeholder="Enter Mobile Number">
    <button onclick="customerLogin()">Continue</button>
  </div>

  <div id="bookingBox" style="display:none;">

    <button onclick="logout()" class="logout">Logout</button>

    <input type="text" id="name" placeholder="Your Name">

    <select id="eventType" onchange="handleOther()">
      <option value="">Select Function</option>
      <option>Marriage</option>
      <option>Birthday</option>
      <option>Reception</option>
      <option>Political Meeting</option>
      <option>Friends Meet</option>
      <option value="Other">Other</option>
    </select>

    <input type="text" id="otherType" placeholder="Enter type" style="display:none;">

    <input type="date" id="start">
    <input type="date" id="end">

    <button onclick="book()">Book Now</button>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
