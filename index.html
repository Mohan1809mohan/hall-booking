<!DOCTYPE html>
<html>
<head>
  <title>YADAVA KALYANAMANTAPAM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Book Function Hall</h1>

<div class="card">
  <input type="text" id="name" placeholder="Customer Name">
  <input type="text" id="phone" placeholder="Phone Number">

  <select id="eventType" onchange="toggleOtherInput()">
    <option value="">Function Type</option>
    <option>Marriage</option>
    <option>Engagement</option>
    <option>Birthday</option>
    <option>Reception</option>
    <option>Political Meeting</option>
    <option>Family ot Friends Meet</option>
    <option value="Other">Other</option>
  </select>

  <input type="text" id="otherType" placeholder="Enter function type" style="display:none;">

  <label>Start Date</label>
  <input type="date" id="start">

  <label>End Date</label>
  <input type="date" id="end">

  <button onclick="book()">Book Now</button>
</div>

<h3>Booked Dates</h3>
<ul id="list"></ul>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script src="script.js"></script>

</body>
</html>
