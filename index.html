<!DOCTYPE html>
<html>
<head>
  <title>YADAVA KALYANAMANTAPAM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay">

  <h1>YADAVA KALYANAMANTAPAM</h1>

  <!-- LOGIN -->
  <div id="loginBox" class="card">
    <h2>Customer Login</h2>
    <input type="text" id="custPhone" placeholder="Enter Phone Number">
    <button onclick="customerLogin()">Login</button>
  </div>

  <!-- BOOKING -->
  <div id="bookingBox" class="card" style="display:none;">
    
    <input type="text" id="name" placeholder="Your Name">

    <select id="eventType">
      <option value="">Function Type</option>
      <option>Marriage</option>
      <option>Birthday</option>
      <option>Reception</option>
      <option>Political Meeting</option>
      <option>Family or Friends Meet</option>
      <option>Other</option>
    </select>

    <input type="text" id="otherType" placeholder="Enter function type" style="display:none;">

    <label>Start Date</label>
    <input type="date" id="start">

    <label>End Date</label>
    <input type="date" id="end">

    <button onclick="book()">Book Now</button>

  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script src="script.js"></script>

</body>
</html>
