<!DOCTYPE html>
<html>
<head>
  <title>YADAVA KALYANAMANTAPAM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
</head>

<body class="bg">

<div class="overlay">

  <div class="card">

    <h2>YADAVA KALYANAMANTAPAM</h2>

    <!-- LOGIN -->
    <div id="loginBox">
      <input type="text" id="custPhone" placeholder="Mobile Number">
      <button onclick="customerLogin()">Continue</button>
    </div>

    <!-- BOOKING -->
    <div id="bookingBox" style="display:none;">

      <button onclick="logout()">Logout</button>

      <input type="text" id="name" placeholder="Your Name">

      <select id="eventType" onchange="handleOther()">
        <option value="">Select Function</option>
        <option>Marriage</option>
        <option>Birthday</option>
        <option>Reception</option>
         <option>Political Meeting</option>
          <option>Family Or Friends Meet</option>
        <option value="Other">Other</option>
      </select>

      <input type="text" id="otherType" placeholder="Enter type" style="display:none;">

      <input type="date" id="start">
      <input type="date" id="end">

      <button onclick="book()">Book Now</button>

      <div id="calendar"></div>

    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script src="script.js"></script>

</body>
</html>
