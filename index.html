<!DOCTYPE html>
<html>
<head>
  <title>YADAVA KALYANAMANTAPAM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="glass-card">

    <h1>YADAVA KALYANAMANTAPAM</h1>

    <!-- LOGIN -->
    <div id="loginBox">
      <input type="text" id="custPhone" placeholder="Enter Mobile Number">
      <button onclick="customerLogin()">Continue</button>
      <button onclick="logout()">Logout</button>
    </div>

    <!-- BOOKING -->
    <div id="bookingBox" style="display:none;">

      <input type="text" id="name" placeholder="Your Name">

      <select id="eventType">
        <option value="">Select Function</option>
        <option>Marriage</option>
        <option>Birthday</option>
        <option>Reception</option>
        <option>Political Meeting</option>
        <option>Family or Friends Meet</option>
        <option value="Other">Other</option>
      </select>

      <input type="text" id="otherType" placeholder="Enter function type" style="display:none;">

      <div class="date-row">
        <input type="date" id="start">
        <input type="date" id="end">
      </div>

      <button onclick="book()">Confirm Booking</button>

    </div>

  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script src="script.js"></script>

</body>
</html>
