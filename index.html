<!DOCTYPE html>
<html>
<head>
  <title>YADAVA KALYANAMANTAPAM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>YADAVA KALYANAMANTAPAM</h2>

<div id="loginBox">
  <input type="text" id="custPhone" placeholder="Enter Mobile Number">
  <button onclick="customerLogin()">Login</button>
</div>

<div id="bookingBox" style="display:none;">

  <button onclick="logout()">Logout</button>

  <input type="text" id="name" placeholder="Name">

  <select id="eventType" onchange="handleOther()">
    <option value="">Function</option>
    <option>Marriage</option>
    <option>Birthday</option>
    <option>Reception</option>
    <option value="Other">Other</option>
  </select>

  <input type="text" id="otherType" placeholder="Enter type" style="display:none;">

  <input type="date" id="start">
  <input type="date" id="end">

  <button onclick="book()">Confirm Booking</button>

  <h3>Booked Dates</h3>
  <div id="calendar"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script src="script.js"></script>

</body>
</html>
